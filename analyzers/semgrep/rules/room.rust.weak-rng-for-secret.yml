rules:
  - id: room.rust.weak-rng-for-secret
    message: A secret-like value is generated with a known non-cryptographic RNG.
    severity: ERROR
    languages: [rust]
    mode: taint
    metadata:
      room_signal: SIGNAL_KIND_RUST_WEAK_RNG_FOR_SECRET
      room_confidence_basis_points: 9000
    pattern-sources:
      - pattern: fastrand::$METHOD(...)
      - patterns:
          - pattern: $RNG.$METHOD(...)
          - pattern-inside: |
              let mut $RNG = fastrand::Rng::$CONSTRUCTOR(...);
              ...
      - patterns:
          - pattern: $RNG.$METHOD(...)
          - pattern-inside: |
              let mut $RNG = rand::rngs::SmallRng::$CONSTRUCTOR(...);
              ...
      - patterns:
          - pattern: $RNG.$METHOD(...)
          - pattern-inside: |
              let mut $RNG = SmallRng::$CONSTRUCTOR(...);
              ...
      - patterns:
          - pattern: $RNG.$METHOD(...)
          - pattern-inside: |
              let mut $RNG = oorandom::$TYPE::new(...);
              ...
          - metavariable-regex:
              metavariable: $TYPE
              regex: '^(?:Rand32|Rand64)$'
      - patterns:
          - pattern: $RNG.$METHOD(...)
          - pattern-inside: |
              let mut $RNG = nanorand::$TYPE::new(...);
              ...
          - metavariable-regex:
              metavariable: $TYPE
              regex: '^(?:WyRand|Pcg64)$'
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: let $SECRET = $VALUE;
              - pattern: let mut $SECRET = $VALUE;
              - pattern: $SECRET = $VALUE;
          - metavariable-regex:
              metavariable: $SECRET
              regex: '(?i)^(?:.*_)?(?:secret|token|api_key|private_key|password|passwd|session_id|session_token|nonce|salt|otp)(?:_.*)?$'
          - focus-metavariable: $VALUE
