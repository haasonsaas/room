syntax = "proto3";

package room.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/haasonsaas/room/gen/go/room/v1;roomv1";

service RuleAdminService {
  rpc CreateRule(CreateRuleRequest) returns (CreateRuleResponse);
  rpc UpdateRule(UpdateRuleRequest) returns (UpdateRuleResponse);
  rpc DeleteRule(DeleteRuleRequest) returns (DeleteRuleResponse);
  rpc ListRules(ListRulesRequest) returns (ListRulesResponse);
  rpc PreviewRuleset(PreviewRulesetRequest) returns (PreviewRulesetResponse);
  rpc PublishRuleset(PublishRulesetRequest) returns (PublishRulesetResponse);
  rpc RollbackRuleset(RollbackRulesetRequest) returns (RollbackRulesetResponse);
  rpc GetActiveRuleset(RuleAdminServiceGetActiveRulesetRequest) returns (RuleAdminServiceGetActiveRulesetResponse);
  rpc GetMcpPolicy(GetMcpPolicyRequest) returns (GetMcpPolicyResponse);
  rpc UpdateMcpPolicy(UpdateMcpPolicyRequest) returns (UpdateMcpPolicyResponse);
  rpc ListAuditEvents(ListAuditEventsRequest) returns (ListAuditEventsResponse);
  rpc IngestReviewFinding(IngestReviewFindingRequest) returns (IngestReviewFindingResponse);
  rpc RecordReviewOutcome(RecordReviewOutcomeRequest) returns (RecordReviewOutcomeResponse);
  rpc AdjudicateReviewFinding(AdjudicateReviewFindingRequest) returns (AdjudicateReviewFindingResponse);
  rpc ListReviewFindings(ListReviewFindingsRequest) returns (ListReviewFindingsResponse);
  rpc InferPolicyCandidates(InferPolicyCandidatesRequest) returns (InferPolicyCandidatesResponse);
  rpc ListPolicyCandidates(ListPolicyCandidatesRequest) returns (ListPolicyCandidatesResponse);
  rpc RunPolicyReplay(RunPolicyReplayRequest) returns (RunPolicyReplayResponse);
  rpc TransitionPolicyCandidate(TransitionPolicyCandidateRequest) returns (TransitionPolicyCandidateResponse);
  rpc TunePolicyCandidate(TunePolicyCandidateRequest) returns (TunePolicyCandidateResponse);
}

service AgentRulesService {
  rpc GetActiveRuleset(AgentRulesServiceGetActiveRulesetRequest) returns (AgentRulesServiceGetActiveRulesetResponse);
  rpc WatchRuleset(WatchRulesetRequest) returns (stream WatchRulesetResponse);
  rpc EvaluatePlan(EvaluatePlanRequest) returns (EvaluatePlanResponse);
  rpc EvaluateDiff(EvaluateDiffRequest) returns (EvaluateDiffResponse);
  rpc EvaluateMcpInvocation(EvaluateMcpInvocationRequest) returns (EvaluateMcpInvocationResponse);
  rpc ReportEvaluation(ReportEvaluationRequest) returns (ReportEvaluationResponse);
}

enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_INFO = 1;
  SEVERITY_LOW = 2;
  SEVERITY_MEDIUM = 3;
  SEVERITY_HIGH = 4;
  SEVERITY_CRITICAL = 5;
}

enum Decision {
  DECISION_UNSPECIFIED = 0;
  DECISION_ALLOW = 1;
  DECISION_WARN = 2;
  DECISION_NEEDS_CHANGES = 3;
  DECISION_DENY = 4;
  DECISION_INDETERMINATE = 5;
}

enum CheckKind {
  CHECK_KIND_UNSPECIFIED = 0;
  CHECK_KIND_PLAN_TEXT = 1;
  CHECK_KIND_DIFF_TEXT = 2;
  CHECK_KIND_FILE_PATH = 3;
  CHECK_KIND_AST_PATTERN = 4;
  CHECK_KIND_SEMGREP = 5;
  CHECK_KIND_HEURISTIC = 6;
}

enum AnalysisPhase {
  ANALYSIS_PHASE_UNSPECIFIED = 0;
  ANALYSIS_PHASE_PLAN = 1;
  ANALYSIS_PHASE_DIFF = 2;
}

enum AnalysisStatus {
  ANALYSIS_STATUS_UNSPECIFIED = 0;
  ANALYSIS_STATUS_COMPLETE = 1;
  ANALYSIS_STATUS_PARTIAL = 2;
  ANALYSIS_STATUS_UNAVAILABLE = 3;
  ANALYSIS_STATUS_FAILED = 4;
  ANALYSIS_STATUS_INVALID = 5;
  ANALYSIS_STATUS_UNTRUSTED = 6;
}

enum SignalKind {
  SIGNAL_KIND_UNSPECIFIED = 0;
  SIGNAL_KIND_TENANT_ACCESS_WITHOUT_TRUSTED_SCOPE = 1;
  SIGNAL_KIND_PROTECTED_ACCESS_WITHOUT_AUTH_CONTEXT = 2;
  SIGNAL_KIND_SECRET_LITERAL = 3;
  SIGNAL_KIND_DYNAMIC_SQL_WITH_UNTRUSTED_INPUT = 4;
  SIGNAL_KIND_UNTRUSTED_OUTBOUND_DESTINATION = 5;
  SIGNAL_KIND_PRIVILEGE_MUTATION_WITHOUT_AUDIT = 6;
  SIGNAL_KIND_UNSIGNED_WEBHOOK = 7;
  SIGNAL_KIND_PASSWORD_PERSISTENCE_WITHOUT_KDF = 8;
  SIGNAL_KIND_PUBLIC_CREDENTIAL_FLOW_WITHOUT_RATE_LIMIT = 9;
  SIGNAL_KIND_DESTRUCTIVE_OPERATION = 10;
  SIGNAL_KIND_RUST_UNSAFE_WITHOUT_SAFETY_CONTRACT = 11;
  SIGNAL_KIND_RUST_PANIC_IN_REQUEST_PATH = 12;
  SIGNAL_KIND_RUST_COMMAND_WITH_UNTRUSTED_ARGUMENT = 13;
  SIGNAL_KIND_RUST_WEAK_RNG_FOR_SECRET = 14;
  SIGNAL_KIND_RUST_UNTRUSTED_PATH = 15;
  SIGNAL_KIND_RUST_PANIC_IN_LIBRARY_API = 16;
  SIGNAL_KIND_RUST_BLOCKING_LOCK_ACROSS_AWAIT = 17;
  SIGNAL_KIND_RUST_UNVALIDATED_EXTERNAL_DESERIALIZATION = 18;
  SIGNAL_KIND_REVIEW_AUTHORIZATION_BOUNDARY = 19;
  SIGNAL_KIND_REVIEW_STATE_TRANSITION = 20;
  SIGNAL_KIND_REVIEW_PROTOCOL_CONTRACT = 21;
  SIGNAL_KIND_REVIEW_GUARDRAIL_COVERAGE = 22;
  SIGNAL_KIND_REVIEW_OPERATIONAL_TRUTH = 23;
  SIGNAL_KIND_REVIEW_SECURITY_BOUNDARY = 24;
  SIGNAL_KIND_REVIEW_NEGATIVE_TEST_GAP = 25;
}

enum McpComplianceMode {
  MCP_COMPLIANCE_MODE_UNSPECIFIED = 0;
  MCP_COMPLIANCE_MODE_DISABLED = 1;
  MCP_COMPLIANCE_MODE_ALLOWLIST = 2;
  MCP_COMPLIANCE_MODE_BLOCKLIST = 3;
}

enum AuditEventKind {
  AUDIT_EVENT_KIND_UNSPECIFIED = 0;
  AUDIT_EVENT_KIND_EVALUATION = 1;
  AUDIT_EVENT_KIND_MCP_INVOCATION = 2;
  AUDIT_EVENT_KIND_RULESET_PUBLISHED = 3;
  AUDIT_EVENT_KIND_RULESET_ROLLED_BACK = 4;
  AUDIT_EVENT_KIND_POLICY_UPDATED = 5;
  AUDIT_EVENT_KIND_AUTH_DENIED = 6;
  AUDIT_EVENT_KIND_REVIEW_FINDING_INGESTED = 7;
  AUDIT_EVENT_KIND_REVIEW_OUTCOME_RECORDED = 8;
  AUDIT_EVENT_KIND_REVIEW_ADJUDICATED = 9;
  AUDIT_EVENT_KIND_POLICY_INFERRED = 10;
  AUDIT_EVENT_KIND_POLICY_REPLAYED = 11;
  AUDIT_EVENT_KIND_POLICY_TRANSITIONED = 12;
  AUDIT_EVENT_KIND_POLICY_TUNED = 13;
}

enum HookProvider {
  HOOK_PROVIDER_UNSPECIFIED = 0;
  HOOK_PROVIDER_CLAUDE_CODE = 1;
  HOOK_PROVIDER_CODEX = 2;
  HOOK_PROVIDER_CURSOR = 3;
  HOOK_PROVIDER_MCP_PROXY = 4;
}

enum IdentityAssurance {
  IDENTITY_ASSURANCE_UNSPECIFIED = 0;
  IDENTITY_ASSURANCE_UNVERIFIED = 1;
  IDENTITY_ASSURANCE_CONFIG_BOUND = 2;
  IDENTITY_ASSURANCE_TRANSPORT_VERIFIED = 3;
}

enum RulesetStatus {
  RULESET_STATUS_UNSPECIFIED = 0;
  RULESET_STATUS_DRAFT = 1;
  RULESET_STATUS_ACTIVE = 2;
  RULESET_STATUS_ARCHIVED = 3;
}

enum ReviewClaimKind {
  REVIEW_CLAIM_KIND_UNSPECIFIED = 0;
  REVIEW_CLAIM_KIND_AUTHORIZATION_BOUNDARY = 1;
  REVIEW_CLAIM_KIND_STATE_TRANSITION = 2;
  REVIEW_CLAIM_KIND_PROTOCOL_CONTRACT = 3;
  REVIEW_CLAIM_KIND_GUARDRAIL_COVERAGE = 4;
  REVIEW_CLAIM_KIND_OPERATIONAL_TRUTH = 5;
  REVIEW_CLAIM_KIND_SECURITY_BOUNDARY = 6;
  REVIEW_CLAIM_KIND_NEGATIVE_TEST_GAP = 7;
}

enum ReviewOutcomeKind {
  REVIEW_OUTCOME_KIND_UNSPECIFIED = 0;
  REVIEW_OUTCOME_KIND_FIX_COMMITTED = 1;
  REVIEW_OUTCOME_KIND_THREAD_RESOLVED = 2;
  REVIEW_OUTCOME_KIND_REJECTED = 3;
  REVIEW_OUTCOME_KIND_MERGED = 4;
  REVIEW_OUTCOME_KIND_REVERTED = 5;
  REVIEW_OUTCOME_KIND_REGRESSION = 6;
  REVIEW_OUTCOME_KIND_POSITIVE_REACTION = 7;
  REVIEW_OUTCOME_KIND_NEGATIVE_REACTION = 8;
}

enum AdjudicationVerdict {
  ADJUDICATION_VERDICT_UNSPECIFIED = 0;
  ADJUDICATION_VERDICT_VALID_GENERALIZABLE = 1;
  ADJUDICATION_VERDICT_VALID_ONE_OFF = 2;
  ADJUDICATION_VERDICT_INVALID = 3;
  ADJUDICATION_VERDICT_NEEDS_EVIDENCE = 4;
}

enum PolicyArtifactKind {
  POLICY_ARTIFACT_KIND_UNSPECIFIED = 0;
  POLICY_ARTIFACT_KIND_DETERMINISTIC_CHECK = 1;
  POLICY_ARTIFACT_KIND_SEMANTIC_ANALYZER = 2;
  POLICY_ARTIFACT_KIND_ARCHITECTURE_POLICY = 3;
  POLICY_ARTIFACT_KIND_ONE_OFF_FINDING = 4;
}

enum RolloutStage {
  ROLLOUT_STAGE_UNSPECIFIED = 0;
  ROLLOUT_STAGE_DRAFT = 1;
  ROLLOUT_STAGE_SHADOW = 2;
  ROLLOUT_STAGE_WARN = 3;
  ROLLOUT_STAGE_BLOCK = 4;
  ROLLOUT_STAGE_PAUSED = 5;
  ROLLOUT_STAGE_ROLLED_BACK = 6;
}

enum TuningActionKind {
  TUNING_ACTION_KIND_UNSPECIFIED = 0;
  TUNING_ACTION_KIND_ADJUST_CONFIDENCE = 1;
  TUNING_ACTION_KIND_NARROW_SCOPE = 2;
  TUNING_ACTION_KIND_EXPAND_SCOPE = 3;
  TUNING_ACTION_KIND_CHANGE_ARTIFACT = 4;
  TUNING_ACTION_KIND_ROLLBACK = 5;
}

message RuleScope {
  repeated string workspaces = 1;
  repeated string repositories = 2;
  repeated string languages = 3;
  repeated string frameworks = 4;
  repeated string paths = 5;
  repeated string agent_types = 6;
}

message RuleCheck {
  CheckKind kind = 1;
  string expression = 2;
  repeated string file_globs = 3;
  string message = 4;
}

message SourceLocation {
  string file_path = 2;
  int32 start_line = 3;
  int32 end_line = 4;
}

message ArtifactRef {
  AnalysisPhase phase = 1;
  bytes sha256 = 2;
  repeated string changed_files = 3;
  repeated string languages = 4;
  repeated string frameworks = 5;
}

message AnalyzerIdentity {
  string id = 1;
  string version = 2;
  bytes config_sha256 = 3;
}

message SecuritySignal {
  SignalKind kind = 1;
  string fingerprint = 2;
  AnalyzerIdentity analyzer = 3;
  SourceLocation location = 4;
  uint32 confidence_basis_points = 5;
  bytes evidence_sha256 = 6;
}

message AnalyzerReceipt {
  AnalyzerIdentity analyzer = 1;
  AnalysisStatus status = 2;
  repeated SignalKind covered_signals = 3;
  repeated SecuritySignal signals = 4;
  string failure_code = 5;
  bytes input_sha256 = 6;
}

message AnalysisReport {
  string report_id = 1;
  ArtifactRef artifact = 2;
  AnalysisStatus status = 3;
  repeated AnalyzerReceipt receipts = 4;
}

message SignalSelector {
  SignalKind signal = 1;
  repeated AnalysisPhase phases = 2;
  uint32 minimum_confidence_basis_points = 3;
}

message EvaluationGap {
  SignalKind required_signal = 1;
  string analyzer_id = 2;
  AnalysisStatus status = 3;
  string reason_code = 4;
}

message McpToolSelector {
  string server_id = 1;
  string tool_name = 2;
}

message McpCompliancePolicy {
  McpComplianceMode mode = 1;
  repeated McpToolSelector selectors = 2;
  bool audit_allowed = 3;
  bool deny_unknown_identity = 4;
  repeated ProviderToolBinding provider_bindings = 5;
}

message ProviderToolBinding {
  HookProvider provider = 1;
  string provider_tool_id = 2;
  string server_id = 3;
  string tool_name = 4;
}

message McpInvocation {
  string server_id = 1;
  string tool_name = 2;
  string transport = 3;
  string endpoint = 4;
  HookProvider provider = 5;
  string provider_tool_id = 6;
  IdentityAssurance identity_assurance = 7;
}

message McpInvocationDecision {
  bool allowed = 1;
  string reason_code = 2;
  McpToolSelector matched_selector = 3;
}

message Rule {
  string id = 1;
  string title = 2;
  string description = 3;
  Severity severity = 4;
  repeated string tags = 5;
  RuleScope scope = 6;
  repeated RuleCheck checks = 7;
  repeated string required_evidence = 8;
  repeated string remediation = 9;
  bool enabled = 10;
  string owner = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
  repeated SignalSelector triggers = 14;
  repeated SignalKind required_coverage = 15;
  RolloutStage rollout_stage = 16;
}

message RulesetVersion {
  string id = 1;
  int32 version = 2;
  string hash = 3;
  RulesetStatus status = 4;
  repeated Rule rules = 5;
  string author = 6;
  string notes = 7;
  google.protobuf.Timestamp published_at = 8;
  McpCompliancePolicy mcp_policy = 9;
  AuthorizationScope authorized_scope = 10;
  string source_hash = 11;
}

message AuthorizationScope {
  string credential_id = 1;
  string subject_id = 2;
  string workspace_id = 3;
  string repository = 4;
  string agent_type = 5;
}

message EvaluationContext {
  string workspace_id = 1;
  string repository = 2;
  string agent_type = 3;
  string cwd = 4;
  repeated string changed_files = 5;
  repeated string languages = 6;
  repeated string frameworks = 7;
  string subject_id = 8;
}

message EvaluationInput {
  EvaluationContext context = 1;
  string plan = 2;
  string diff = 3;
  AnalysisPhase phase = 4;
}

message RuleMatch {
  string rule_id = 1;
  string title = 2;
  Severity severity = 3;
  string message = 4;
  repeated string tags = 5;
  repeated string required_evidence = 6;
  repeated string remediation = 7;
  RolloutStage rollout_stage = 8;
}

message EvaluationResult {
  Decision decision = 1;
  Severity highest_severity = 2;
  repeated RuleMatch matches = 3;
  repeated string required_checks = 4;
  string ruleset_id = 5;
  int32 ruleset_version = 6;
  string ruleset_hash = 7;
  AnalysisStatus analysis_status = 8;
  string audit_event_id = 9;
  repeated AnalyzerReceipt analyzer_receipts = 10;
  repeated EvaluationGap gaps = 11;
  bytes input_sha256 = 12;
  string evaluation_id = 13;
}

message AuditEvent {
  string id = 1;
  AuditEventKind kind = 2;
  google.protobuf.Timestamp occurred_at = 3;
  string subject_id = 4;
  string workspace_id = 5;
  string repository = 6;
  string agent_type = 7;
  string ruleset_id = 8;
  int32 ruleset_version = 9;
  string ruleset_hash = 10;
  Decision decision = 11;
  Severity highest_severity = 12;
  AnalysisStatus analysis_status = 13;
  McpInvocation mcp_invocation = 14;
  string reason_code = 15;
  repeated string matched_rule_ids = 16;
  string policy_candidate_id = 17;
  string evidence_record_id = 18;
}

message ReviewSource {
  string repository = 1;
  int64 pull_request_number = 2;
  string head_sha = 3;
  string review_comment_id = 4;
  string reviewer_id = 5;
  string provider = 6;
}

message ReviewOutcome {
  string id = 1;
  ReviewOutcomeKind kind = 2;
  string actor_id = 3;
  string commit_sha = 4;
  int32 weight_basis_points = 5;
  google.protobuf.Timestamp occurred_at = 6;
}

message ReviewAdjudication {
  string id = 1;
  AdjudicationVerdict verdict = 2;
  string agent_id = 3;
  string model_id = 4;
  bytes input_sha256 = 5;
  uint32 confidence_basis_points = 6;
  repeated string evidence_refs = 7;
  google.protobuf.Timestamp occurred_at = 8;
}

message ReviewFinding {
  string id = 1;
  ReviewSource source = 2;
  ReviewClaimKind claim_kind = 3;
  string invariant = 4;
  repeated string preconditions = 5;
  repeated string causal_path = 6;
  string impact = 7;
  repeated string required_evidence = 8;
  repeated string remediation = 9;
  Severity severity = 10;
  uint32 confidence_basis_points = 11;
  repeated string affected_paths = 12;
  repeated ReviewOutcome outcomes = 13;
  repeated ReviewAdjudication adjudications = 14;
  int64 reviewer_cost_micros = 15;
  int64 reviewer_input_tokens = 16;
  int64 reviewer_output_tokens = 17;
  google.protobuf.Timestamp created_at = 18;
  google.protobuf.Timestamp updated_at = 19;
}

message PolicyMetrics {
  uint32 support_count = 1;
  uint32 accepted_count = 2;
  uint32 rejected_count = 3;
  uint32 true_positive_count = 4;
  uint32 false_positive_count = 5;
  uint32 false_negative_count = 6;
  uint32 precision_basis_points = 7;
  uint32 recall_basis_points = 8;
  int64 estimated_reviewer_cost_avoided_micros = 9;
  int64 estimated_reviewer_tokens_avoided = 10;
}

message PolicyCandidate {
  string id = 1;
  ReviewClaimKind claim_kind = 2;
  PolicyArtifactKind artifact_kind = 3;
  Rule proposed_rule = 4;
  repeated string source_finding_ids = 5;
  PolicyMetrics metrics = 6;
  RolloutStage rollout_stage = 7;
  uint32 minimum_confidence_basis_points = 8;
  bool protected_org_policy = 9;
  string created_by = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message ReplayCaseResult {
  string finding_id = 1;
  bool expected_match = 2;
  bool actual_match = 3;
  uint32 confidence_basis_points = 4;
}

message PolicyReplayRun {
  string id = 1;
  string policy_candidate_id = 2;
  repeated ReplayCaseResult cases = 3;
  PolicyMetrics metrics = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp completed_at = 6;
  bytes policy_candidate_sha256 = 7;
}

message TuningDecision {
  string id = 1;
  string policy_candidate_id = 2;
  TuningActionKind action = 3;
  uint32 previous_confidence_basis_points = 4;
  uint32 new_confidence_basis_points = 5;
  repeated string evidence_replay_ids = 6;
  string actor_id = 7;
  google.protobuf.Timestamp occurred_at = 8;
}

message CreateRuleRequest {
  Rule rule = 1;
}

message CreateRuleResponse {
  Rule rule = 1;
}

message UpdateRuleRequest {
  Rule rule = 1;
}

message UpdateRuleResponse {
  Rule rule = 1;
}

message DeleteRuleRequest {
  string rule_id = 1;
}

message DeleteRuleResponse {
  bool deleted = 1;
}

message ListRulesRequest {
  EvaluationContext context = 1;
  bool include_disabled = 2;
}

message ListRulesResponse {
  repeated Rule rules = 1;
}

message PreviewRulesetRequest {
  repeated Rule rules = 1;
  EvaluationInput input = 2;
}

message PreviewRulesetResponse {
  EvaluationResult result = 1;
}

message PublishRulesetRequest {
  string author = 1;
  string notes = 2;
}

message PublishRulesetResponse {
  RulesetVersion ruleset = 1;
}

message RollbackRulesetRequest {
  int32 version = 1;
}

message RollbackRulesetResponse {
  RulesetVersion ruleset = 1;
}

message GetMcpPolicyRequest {}

message GetMcpPolicyResponse {
  McpCompliancePolicy policy = 1;
}

message UpdateMcpPolicyRequest {
  McpCompliancePolicy policy = 1;
}

message UpdateMcpPolicyResponse {
  McpCompliancePolicy policy = 1;
}

message ListAuditEventsRequest {
  int32 limit = 1;
  AuditEventKind kind = 2;
}

message ListAuditEventsResponse {
  repeated AuditEvent events = 1;
}

message IngestReviewFindingRequest {
  ReviewFinding finding = 1;
}
message IngestReviewFindingResponse {
  ReviewFinding finding = 1;
}
message RecordReviewOutcomeRequest {
  string finding_id = 1;
  ReviewOutcome outcome = 2;
}
message RecordReviewOutcomeResponse {
  ReviewFinding finding = 1;
}
message AdjudicateReviewFindingRequest {
  string finding_id = 1;
  ReviewAdjudication adjudication = 2;
}
message AdjudicateReviewFindingResponse {
  ReviewFinding finding = 1;
}
message ListReviewFindingsRequest {
  string repository = 1;
  ReviewClaimKind claim_kind = 2;
  int32 limit = 3;
}
message ListReviewFindingsResponse {
  repeated ReviewFinding findings = 1;
}
message InferPolicyCandidatesRequest {
  string repository = 1;
  uint32 minimum_support = 2;
}
message InferPolicyCandidatesResponse {
  repeated PolicyCandidate candidates = 1;
}
message ListPolicyCandidatesRequest {
  RolloutStage rollout_stage = 1;
}
message ListPolicyCandidatesResponse {
  repeated PolicyCandidate candidates = 1;
}
message RunPolicyReplayRequest {
  string policy_candidate_id = 1;
}
message RunPolicyReplayResponse {
  PolicyReplayRun replay = 1;
}
message TransitionPolicyCandidateRequest {
  string policy_candidate_id = 1;
  RolloutStage target_stage = 2;
  bool human_approved = 3;
  google.protobuf.Timestamp expected_updated_at = 4;
}
message TransitionPolicyCandidateResponse {
  PolicyCandidate candidate = 1;
}
message TunePolicyCandidateRequest {
  string policy_candidate_id = 1;
  google.protobuf.Timestamp expected_updated_at = 2;
}
message TunePolicyCandidateResponse {
  PolicyCandidate candidate = 1;
  TuningDecision decision = 2;
}

message RuleAdminServiceGetActiveRulesetRequest {
  EvaluationContext context = 1;
}

message RuleAdminServiceGetActiveRulesetResponse {
  RulesetVersion ruleset = 1;
}

message AgentRulesServiceGetActiveRulesetRequest {
  EvaluationContext context = 1;
}

message AgentRulesServiceGetActiveRulesetResponse {
  RulesetVersion ruleset = 1;
}

message WatchRulesetRequest {
  EvaluationContext context = 1;
  int32 current_version = 2;
}

message WatchRulesetResponse {
  RulesetVersion ruleset = 1;
}

message EvaluatePlanRequest {
  EvaluationInput input = 1;
}

message EvaluatePlanResponse {
  EvaluationResult result = 1;
}

message EvaluateDiffRequest {
  EvaluationInput input = 1;
}

message EvaluateDiffResponse {
  EvaluationResult result = 1;
}

message EvaluateMcpInvocationRequest {
  EvaluationContext context = 1;
  McpInvocation invocation = 2;
}

message EvaluateMcpInvocationResponse {
  McpInvocationDecision decision = 1;
  string audit_event_id = 2;
}

message ReportEvaluationRequest {
  EvaluationResult result = 1;
  string session_id = 2;
  string tool_name = 3;
}

message ReportEvaluationResponse {
  bool accepted = 1;
}

message StoreSnapshot {
  repeated Rule draft_rules = 1;
  repeated RulesetVersion versions = 2;
  int32 active_version = 3;
  int32 next_version = 4;
  McpCompliancePolicy draft_mcp_policy = 5;
}
